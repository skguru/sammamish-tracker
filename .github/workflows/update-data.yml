name: Update Zillow Market Data

on:
  # Run every Monday at 9am UTC (2am Pacific)
  schedule:
    - cron: "0 9 * * 1"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Zillow data and write data.json
        run: python fetch_data.py

      - name: Commit data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d')"
          git push
