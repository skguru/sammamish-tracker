<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sammamish SFR Market Tracker — Skyline HS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1f2e;--ink2:#4a5068;--ink3:#8890a8;
  --bg:#f4f5fa;--card:#fff;--border:#e2e5f0;
  --amber:#c8790a;--amber-bg:#fef3e2;--amber-bd:#f0c040;
  --green:#1a7a4a;--green-bg:#e8f7ef;--green-bd:#7fccaa;
  --red:#b83232;--red-bg:#fdf0f0;--red-bd:#f0a0a0;
  --blue:#1e55a0;--blue-bg:#eef3fb;--blue-bd:#a0bce8;
  --purple:#5b3fa0;--purple-bg:#f0ecfb;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:32px 20px 60px}

.page-header{margin-bottom:24px}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(21px,4vw,29px);font-weight:500;line-height:1.2}
.sub{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:4px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.pill{font-size:11px;font-family:'DM Mono',monospace;padding:3px 11px;border-radius:20px;border:0.5px solid}
.pill-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.pill-gray{background:var(--bg);border-color:var(--border);color:var(--ink3)}
.pill-green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}

.sec{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin:24px 0 10px}

.rec-banner{background:var(--green-bg);border:1.5px solid var(--green-bd);border-radius:14px;padding:18px 22px;display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.rec-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.rec-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--green);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.rec-title{font-size:16px;font-weight:500;color:var(--green);margin-bottom:6px}
.rec-body{font-size:13px;color:var(--ink2);line-height:1.7}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:4px}
.mc{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:13px 15px}
.mc-lbl{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mc-val{font-size:20px;font-weight:500;line-height:1}
.mc-delta{font-size:11px;margin-top:4px;font-family:'DM Mono',monospace}
.up{color:var(--red)}.dn{color:var(--green)}.neu{color:var(--ink3)}

.card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.card.winner{border:1.5px solid var(--green-bd)}
.card-title{font-size:14px;font-weight:500;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:14px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:560px){.two-col{grid-template-columns:1fr}}

/* prediction highlight box */
.pred-box{border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
.pred-box.up-pred{background:var(--red-bg);border:0.5px solid var(--red-bd)}
.pred-box.dn-pred{background:var(--green-bg);border:0.5px solid var(--green-bd)}
.pred-box.neu-pred{background:var(--amber-bg);border:0.5px solid var(--amber-bd)}
.pred-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.pred-body{font-size:13px;line-height:1.65}
.pred-price{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;margin:4px 0}

/* seasonal */
.seasonal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sc{padding:10px 8px;border-radius:8px;text-align:center;position:relative}
.sc.rec-sc{border:1.5px solid var(--green-bd)}
.sc-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:9px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;white-space:nowrap}
.sc-name{font-size:12px;font-weight:500;margin-bottom:2px}
.sc-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.sc-note{font-size:10px;margin-top:2px;opacity:.8}
.s-hot{background:#fdf0f0;color:var(--red)}
.s-warm{background:#fff8ec;color:var(--amber)}
.s-cool{background:#eef3fb;color:var(--blue)}
.s-cold{background:#e8f7ef;color:var(--green)}

/* compare */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:520px){.compare-grid{grid-template-columns:1fr}}
.season-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:18px 16px;position:relative}
.season-card.winner-card{border:1.5px solid var(--green-bd)}
.winner-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-family:'DM Mono',monospace;padding:3px 12px;border-radius:20px;white-space:nowrap}
.sc-season{font-size:10px;font-family:'DM Mono',monospace;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sc-name2{font-size:15px;font-weight:500;margin-bottom:12px}
.sc-score-row{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}
.sc-big{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;line-height:1}
.bar-wrap{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:12px}
.bar{height:100%;border-radius:4px;transition:width .6s ease}
.factor-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.factor{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--ink2);line-height:1.4}
.fi{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:500}
.fi-g{background:var(--green-bg);color:var(--green)}
.fi-b{background:var(--red-bg);color:var(--red)}
.fi-n{background:var(--bg);color:var(--ink3)}

/* timeline */
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:14px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0}
.tl-dot{width:11px;height:11px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:3px}
.tl-dot.go{background:var(--green)}
.tl-line{flex:1;width:2px;background:var(--border);margin-top:3px;min-height:20px}
.tl-item:last-child .tl-line{display:none}
.tl-right{padding-bottom:20px;flex:1}
.tl-when{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);margin-bottom:2px}
.tl-what{font-size:13px;color:var(--ink2);line-height:1.6}
.tl-what strong{color:var(--ink);font-weight:500}

.legend-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace}
.leg{display:flex;align-items:center;gap:5px}
.leg-line{width:18px;height:3px;border-radius:2px}
.leg-dash{width:18px;height:3px;border-radius:2px;background:repeating-linear-gradient(90deg,#5b3fa0 0,#5b3fa0 4px,transparent 4px,transparent 7px)}
.leg-box{width:10px;height:10px;border-radius:2px}

.footer{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;line-height:1.7;margin-top:8px}
.footer a{color:var(--blue)}

#loading{text-align:center;padding:80px 20px;font-size:14px;color:var(--ink3);font-family:'DM Mono',monospace}
.err{background:var(--red-bg);border:0.5px solid var(--red-bd);border-radius:10px;padding:14px;font-size:13px;color:var(--red);margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="page">
  <div id="loading">Loading market data…</div>
  <div class="err" id="errBox"></div>
  <div id="app" style="display:none"></div>
</div>
<script>
function fmtM(n){if(!n)return'–';return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':'$'+Math.round(n/1000)+'K';}
function fmt(n){return'$'+Math.round(n/1000)+'K';}
function scoreColor(s){return s>=7?'#1a7a4a':s>=5?'#c8790a':'#b83232';}
function sClass(s){return s>=7?'s-cold':s>=5?'s-cool':s>=3?'s-warm':'s-hot';}

let priceChart;

function render(d){
  const rec   = d.recommended_season||'fall';
  const ss    = d.seasonal_scores||{};
  const fp    = d.price_with_forecast||[];
  const fall_pred   = d.fall_2026_predicted_price;
  const spring_pred = d.spring_2026_predicted_price;
  const fall_delta  = d.fall_price_delta_pct;

  // Prediction banner
  let predClass='neu-pred', predIcon='📊';
  let predMsg='';
  if(fall_delta!==null && fall_delta!==undefined){
    if(fall_delta < -1){
      predClass='dn-pred'; predIcon='📉';
      predMsg=`Prices are forecast to be <strong>${Math.abs(fall_delta)}% lower</strong> in Fall 2026 than today — a good sign for buyers. If you wait for fall, the model suggests you may save roughly ${fmtM(d.median_price - fall_pred)} off today's median.`;
    } else if(fall_delta > 3){
      predClass='up-pred'; predIcon='📈';
      predMsg=`Prices are forecast to be <strong>${fall_delta}% higher</strong> in Fall 2026 vs today. Even so, Fall is still the right season — you'd pay less than in Spring 2026 due to lower competition and fewer bidding wars.`;
    } else {
      predClass='neu-pred'; predIcon='〰️';
      predMsg=`Prices are forecast to be roughly <strong>flat</strong> in Fall 2026 vs today (${fall_delta>0?'+':''}${fall_delta}%). The timing advantage of fall comes from less competition and negotiating room, not necessarily a lower sticker price.`;
    }
  }

  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="page-header">
      <h1>Sammamish SFR Market Tracker</h1>
      <div class="sub">Skyline HS zone · Zip 98075 · Single Family Residential · Auto-updated weekly</div>
      <div class="pills">
        <span class="pill pill-amber">4 bed</span>
        <span class="pill pill-amber">2+ bath</span>
        <span class="pill pill-amber">2,400–3,200 sqft</span>
        <span class="pill pill-amber">$1.25M–$2.0M</span>
        <span class="pill pill-amber">SFR only</span>
        <span class="pill pill-gray">Updated: ${d.updated_at}</span>
        ${d.home_type?`<span class="pill pill-green">${d.home_type}</span>`:''}
      </div>
    </div>

    <div class="rec-banner">
      <div class="rec-icon">🏆</div>
      <div>
        <div class="rec-lbl">Recommendation</div>
        <div class="rec-title">${rec==='fall'?'Buy in Fall 2026 — September to November':'Buy in Spring 2026 — March to May'}</div>
        <div class="rec-body">${rec==='fall'
          ?`Fall is the most buyer-friendly window in Sammamish. Fewer competing offers, sellers motivated to close before year-end, and you keep your contingencies. Homes that sat unsold since summer often see price reductions by mid-October — that is your negotiating window.`
          :`Spring is giving a better opportunity this cycle. More inventory is hitting the market and competition is softer than recent years. You will have more homes to choose from in your $1.25M–$2.0M range.`}</div>
      </div>
    </div>

    <div class="sec">Current market snapshot — Single Family Residential</div>
    <div class="metrics-grid">
      <div class="mc">
        <div class="mc-lbl">Median SFR price</div>
        <div class="mc-val">${fmtM(d.median_price)}</div>
        <div class="mc-delta ${(d.yoy_pct||0)>0?'up':'dn'}">${(d.yoy_pct||0)>0?'↑':'↓'} ${Math.abs(d.yoy_pct||0).toFixed(1)}% YoY</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">Month over month</div>
        <div class="mc-val" style="font-size:17px">${d.mom_pct!=null?(d.mom_pct>0?'+':'')+d.mom_pct+'%':'–'}</div>
        <div class="mc-delta neu">vs 4 weeks ago</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">Inventory</div>
        <div class="mc-val">${(d.months_inventory||0).toFixed(1)}<span style="font-size:13px;color:var(--ink3)"> mo</span></div>
        <div class="mc-delta neu">${(d.months_inventory||0)<=1.5?'Tight — seller mkt':(d.months_inventory||0)<=3?'Balanced':'Buyer-lean'}</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">Days to pending</div>
        <div class="mc-val">${d.avg_dom||'–'}<span style="font-size:13px;color:var(--ink3)"> days</span></div>
        <div class="mc-delta neu">${(d.avg_dom||0)<=7?'Extremely fast':(d.avg_dom||0)<=14?'Very fast':(d.avg_dom||0)<=21?'Moderate':'Slower pace'}</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">Sold over asking</div>
        <div class="mc-val">${d.pct_sold_above_list||'–'}<span style="font-size:13px;color:var(--ink3)">%</span></div>
        <div class="mc-delta ${(d.pct_sold_above_list||0)>50?'up':'neu'}">of homes</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">New listings</div>
        <div class="mc-val">${d.new_listings||'–'}</div>
        <div class="mc-delta neu">this week</div>
      </div>
    </div>

    ${predMsg?`
    <div class="sec">Fall 2026 price forecast</div>
    <div class="pred-box ${predClass}">
      <div class="pred-icon">${predIcon}</div>
      <div class="pred-body">
        <div class="pred-price">Predicted fall 2026 median: ${fmtM(fall_pred)}</div>
        ${predMsg}
        ${spring_pred?`<div style="margin-top:6px;font-size:12px;color:var(--ink3)">Spring 2026 predicted median: ${fmtM(spring_pred)} &nbsp;·&nbsp; Fall saves you roughly ${fmtM(Math.max(0,spring_pred-fall_pred))} vs spring on price alone, before negotiating.</div>`:''}
      </div>
    </div>`:''}

    <div class="sec">Price trend + Fall 2026 forecast</div>
    <div class="card">
      <div class="card-title">12-month history + model forecast to Dec 2026</div>
      <div class="card-sub">SFR median sale price · zip 98075 · dotted = model projection · shaded = your target windows</div>
      <div style="position:relative;width:100%;height:240px">
        <canvas id="priceChart" role="img" aria-label="Price trend and forecast chart for Sammamish SFR zip 98075 through Dec 2026"></canvas>
      </div>
      <div class="legend-row">
        <span class="leg"><span class="leg-line" style="background:#c8790a"></span>Actual prices</span>
        <span class="leg"><span class="leg-dash"></span>Forecast (model)</span>
        <span class="leg"><span class="leg-box" style="background:rgba(200,121,10,.18)"></span>Spring window</span>
        <span class="leg"><span class="leg-box" style="background:rgba(26,122,74,.18)"></span>Fall target window</span>
        <span class="leg"><span class="leg-line" style="background:#e2e5f0;height:2px;border-top:2px dashed #c8790a"></span>$1.25M–$2.0M range</span>
      </div>
    </div>

    <div class="sec">Spring vs Fall 2026 — head to head</div>
    <div class="compare-grid">
      ${buildSeasonCard('fall','Fall 2026 — Sep to Nov',d.fall_2026_score,rec==='fall',[
        {t:'g',v:'Fewer competing offers — often 0 to 1'},
        {t:'g',v:'Homes sitting since summer may cut price'},
        {t:'g',v:'Inspection and financing contingencies accepted'},
        {t:'g',v:'Sellers motivated to close before year-end'},
        {t:'b',v:'Less inventory — fewer homes to choose from'},
        {t:'n',v:'Rate uncertainty — watch Fed signals'},
      ])}
      ${buildSeasonCard('spring','Spring 2026 — Mar to May',d.spring_2026_score,rec==='spring',[
        {t:'g',v:'Most listings hit the market — best selection'},
        {t:'g',v:'Easier to compare homes side by side'},
        {t:'b',v:'Bidding wars on nearly every desirable home'},
        {t:'b',v:'Expect 3 to 6% over asking price'},
        {t:'b',v:'Waived contingencies become the norm'},
        {t:'n',v:'Faster closes due to competition pressure'},
      ])}
    </div>

    <div class="two-col">
      <div class="card" style="margin-bottom:0">
        <div class="card-title">Seasonal buyer scores</div>
        <div class="card-sub">10 = best conditions for a buyer</div>
        <div class="seasonal-grid">
          ${['spring','summer','fall','winter'].map(s=>{
            const v=ss[s]||{score:5,label:'',note:''};
            const isR=s===rec;
            return`<div class="sc ${sClass(v.score)} ${isR?'rec-sc':''}">
              ${isR?'<div class="sc-tag">✓ target</div>':''}
              <div class="sc-name">${s[0].toUpperCase()+s.slice(1)}</div>
              <div class="sc-num">${v.score}/10</div>
              <div class="sc-note">${v.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-title">Your price target range</div>
        <div class="card-sub">$1.25M – $2.0M · SFR · Skyline HS zone</div>
        <div style="font-size:13px;color:var(--ink2);line-height:1.7;margin-top:4px">
          ${d.median_price?`Current SFR median is <strong>${fmtM(d.median_price)}</strong> — ${d.median_price<1250000?'below your range, suggesting strong availability':'within your $1.25M–$2.0M target'}.`:''}
          ${fall_pred?`<br><br>Fall 2026 model predicts <strong>${fmtM(fall_pred)}</strong> — ${fall_pred<=2000000?'comfortably within your budget ceiling':'approaching your upper limit, factor this in when setting your offer ceiling'}.`:''}
          <br><br>Homes in the 2,400–3,200 sqft range near Skyline typically list between $1.35M–$1.85M today. Your $2.0M ceiling gives you negotiating room.
        </div>
      </div>
    </div>

    <div class="sec" style="margin-top:24px">Action plan — buying Fall 2026</div>
    <div class="card">
      <div class="timeline">
        ${[
          {when:'Now — Apr 2025',go:false,what:`<strong>Set saved searches.</strong> Redfin and Zillow for Skyline HS zone, 4BR, $1.25M–$2.0M, SFR only. Watch for 3+ months to calibrate your feel for pricing and which streets move fastest.`},
          {when:'Jul – Sep 2025',go:false,what:`<strong>Choose a buyer's agent</strong> who specializes in Sammamish. Ask: "How many Skyline HS zone SFR transactions in the last 12 months?" A good agent tracks specific subdivisions.`},
          {when:'Jan – Mar 2026',go:false,what:`<strong>Get fully pre-approved.</strong> Lock your max budget with a local lender. Watch spring 2026 comps closely — they set the pricing baseline for your fall negotiations.`},
          {when:'Sep – Nov 2026',go:true,what:`<strong>Go time.</strong> Move fast on new listings in the first 7 days. Be patient on anything sitting past 3 weeks — ask for inspection contingency and closing cost credits. Target homes listed in late August that did not close.`},
        ].map(t=>`
          <div class="tl-item">
            <div class="tl-left"><div class="tl-dot ${t.go?'go':''}"></div><div class="tl-line"></div></div>
            <div class="tl-right"><div class="tl-when">${t.when}</div><div class="tl-what">${t.what}</div></div>
          </div>`).join('')}
      </div>
    </div>

    <div class="footer">
      Data: ${d.data_source||'Zillow Research'} · Updated every Monday via GitHub Actions ·
      <a href="https://www.redfin.com/city/17827/WA/Sammamish/housing-market" target="_blank">Redfin Sammamish</a> ·
      <a href="https://www.zillow.com/sammamish-wa/home-values/" target="_blank">Zillow</a> ·
      <a href="https://www.zillow.com/research/data/" target="_blank">Zillow Research Data</a><br>
      ${d.criteria||''} · Forecast is a statistical model, not a guarantee · Verify with a licensed agent before making offers.
    </div>
  `;

  app.style.display='block';
  buildChart(fp);
}

function buildSeasonCard(id,name,score,isWinner,factors){
  return`<div class="season-card ${isWinner?'winner-card':''}">
    ${isWinner?'<div class="winner-badge">✓ recommended</div>':''}
    <div class="sc-season">Option ${id==='fall'?'B':'A'}</div>
    <div class="sc-name2">${name}</div>
    <div class="sc-score-row">
      <div class="sc-big" style="color:${scoreColor(score)}">${score}</div>
      <div style="font-size:12px;color:var(--ink3)">/10 buyer score</div>
    </div>
    <div class="bar-wrap"><div class="bar" style="width:${score*10}%;background:${scoreColor(score)}"></div></div>
    <ul class="factor-list">
      ${factors.map(f=>`<li class="factor"><div class="fi fi-${f.t}">${f.t==='g'?'+':f.t==='b'?'−':'~'}</div>${f.v}</li>`).join('')}
    </ul>
  </div>`;
}

function buildChart(fp){
  const ctx=document.getElementById('priceChart');
  if(!ctx||!fp.length) return;
  if(priceChart) priceChart.destroy();

  const labels  = fp.map(p=>p.month);
  const actuals = fp.map(p=>p.type==='actual'?p.price:null);
  const forecst = fp.map((p,i)=>{
    if(p.type==='forecast') return p.price;
    // bridge: include last actual point so line connects
    if(i>0 && fp[i+1]&&fp[i+1].type==='forecast') return p.price;
    return null;
  });

  // spring 2026 highlight: Mar/Apr/May 26
  const springH = fp.map(p=>(['Mar \'26','Apr \'26','May \'26'].includes(p.month))?p.price:null);
  // fall 2026 highlight: Sep/Oct/Nov 26
  const fallH   = fp.map(p=>(['Sep \'26','Oct \'26','Nov \'26'].includes(p.month))?p.price:null);

  const prices  = fp.map(p=>p.price).filter(Boolean);
  const mn = Math.min(1250000,...prices)*0.975;
  const mx = Math.max(2000000,...prices)*1.02;

  priceChart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Actual',data:actuals,borderColor:'#c8790a',backgroundColor:'rgba(200,121,10,0.05)',borderWidth:2.5,pointRadius:3.5,pointBackgroundColor:'#c8790a',fill:true,tension:0.38,order:1},
        {label:'Forecast',data:forecst,borderColor:'#5b3fa0',backgroundColor:'transparent',borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,tension:0.38,order:1},
        {label:'Spring window',data:springH,borderColor:'transparent',backgroundColor:'rgba(200,121,10,0.15)',borderWidth:0,pointRadius:0,fill:true,tension:0.38,order:2},
        {label:'Fall window',data:fallH,borderColor:'transparent',backgroundColor:'rgba(26,122,74,0.18)',borderWidth:0,pointRadius:0,fill:true,tension:0.38,order:2},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          filter:i=>i.datasetIndex<=1&&i.parsed.y!==null,
          callbacks:{label:c=>c.datasetIndex===0?'  Actual: '+fmtM(c.parsed.y):'  Forecast: '+fmtM(c.parsed.y)}
        },
        annotation:{} // placeholder
      },
      scales:{
        y:{
          min:mn,max:mx,
          ticks:{callback:v=>fmt(v),font:{size:10}},
          grid:{color:'rgba(0,0,0,.04)'}
        },
        x:{
          ticks:{font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:16},
          grid:{display:false}
        }
      }
    }
  });
}

fetch('data.json?v='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(data=>{
    document.getElementById('loading').style.display='none';
    render(data);
  })
  .catch(err=>{
    document.getElementById('loading').style.display='none';
    const e=document.getElementById('errBox');
    e.style.display='block';
    e.textContent='Could not load data.json — '+err.message;
  });
</script>
</body>
</html>
